spring:
  application:
    name: vector9

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vector9}
    username: ${DB_USER:vector9}
    password: ${DB_PASSWORD:vector9}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jooq:
    sql-dialect: POSTGRES

  jackson:
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true

logging:
  level:
    root: INFO
    md.hashcode.vector9: DEBUG
    org.jooq: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
  file:
    name: ${VECTOR9_LOG_FILE:logs/vector9.log}

vector9:
  graphql:
    base-url: https://999.md/graphql
    timeout-ms: 30000

  crawler:
    enabled: false
    schedule-cron: "0 */15 * * * *"
    request-delay-ms: 1000
    jitter-ms: 200
    page-size: 50
    unchanged-stop-threshold: 5
    locale: ro_RO
    language: ro
    source-header: desktop
    input-source: AD_SOURCE_DESKTOP

  enrichment:
    enabled: false
    schedule-cron: "0 0 1 * * *"
    batch-size: 20
    delay-ms: 3000
    refresh-days: 30

  tracking:
    deletion-threshold-days: 7
    view-batch-size: 50
    write-view-history: true
    language: ro
    source-header: desktop
